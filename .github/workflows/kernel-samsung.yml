name: Kernel Config - Samsung

permissions:
  contents: write  # Allow writing to repository contents
  actions: write   # Allows triggering actions

on:
  workflow_call:
    inputs:
      susfs:
        required: true
        type: string
      bbg:
        required: true
        type: string
      unicodefix:
        required: true
        type: string
      zeromount:
        required: true
        type: string
      ksun:
        required: true
        type: string
      droidspace:
        required: true
        type: string
      ntsync:
        required: true
        type: string
      bbr:
        required: true
        type: string
      cache:
        required: true
        type: string

jobs:
  build-kernels-a12:
    name: "Samsung-${{ matrix.branch }}-${{ matrix.kernel_version }}-${{ matrix.android_version }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: "SM-S928B-Oneui7"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S928B-Oneui8-bit4"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S928B-Oneui8-bit5"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S928B-Oneui6.1"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-A556B-Oneui7-bitA"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-A556E-Oneui7-bitA"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S926B-Oneui8"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S926B-Oneui7-bit7"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S926B-Oneui7-bit8"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-S926B-Oneui7-bit9"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          - branch: "SM-F741B-Oneui8"
            android_version: "android14"
            kernel_version: "6.1"
            build_type: "Bazel"
          

    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      branch: ${{ matrix.branch }}
      build_type: ${{ matrix.build_type }}
      susfs: ${{ inputs.susfs }}
      bbg: ${{ inputs.bbg }}
      unicodefix: ${{ inputs.unicodefix }}
      zeromount: ${{ inputs.zeromount }}
      ksun: ${{ inputs.ksun }}
      droidspace: ${{ inputs.droidspace }}
      ntsync: ${{ inputs.ntsync }}
      bbr: ${{ inputs.bbr }}
      cache: ${{ inputs.cache }}

