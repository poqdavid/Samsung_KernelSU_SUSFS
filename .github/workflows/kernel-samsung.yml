name: Kernel Config - Samsung

permissions:
  contents: write  # Allow writing to repository contents
  actions: write   # Allows triggering actions

on:
  workflow_call:
    inputs:
      susfs:
        required: true
        type: string
      bbg:
        required: true
        type: string
      unicodefix:
        required: true
        type: string
      zeromount:
        required: true
        type: string
      ksun:
        required: true
        type: string
      droidspace:
        required: true
        type: string
      ntsync:
        required: true
        type: string
      bbr:
        required: true
        type: string
      cache:
        required: true
        type: string

jobs:
  build-kernels-a12:
    name: "Samsung-${{ matrix.branch }}-${{ matrix.kernel_version }}-${{ matrix.android_version }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: "SM-A546B-Oneui7"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-A546B-Oneui8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-A546E-Oneui7"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-A546E-Oneui8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-A166B-Oneui7"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-X710-Oneui6.1.1"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-X916B"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-F946N-Oneui7"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-F946B-Oneui8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-S916B-Oneui8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-S918B-Oneui8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-M146B-Oneui7-ADYJ2"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-S911B-Oneui8-bit8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-S911B-Oneui6.1-bit7"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-S911B-Oneui6.1-bit8"
            android_version: "android13"
            kernel_version: "5.15"
          - branch: "SM-X610-Oneui6.1.1-bit7"
            android_version: "android13"
            kernel_version: "5.15"
          

    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      branch: ${{ matrix.branch }}
      build_type: ${{ matrix.build_type }}
      susfs: ${{ inputs.susfs }}
      bbg: ${{ inputs.bbg }}
      unicodefix: ${{ inputs.unicodefix }}
      zeromount: ${{ inputs.zeromount }}
      ksun: ${{ inputs.ksun }}
      droidspace: ${{ inputs.droidspace }}
      ntsync: ${{ inputs.ntsync }}
      bbr: ${{ inputs.bbr }}
      cache: ${{ inputs.cache }}

