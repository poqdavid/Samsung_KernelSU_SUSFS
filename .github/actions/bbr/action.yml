name: add bbrv3
description: enable configs to add bbrv3 to kernel
inputs:
  android_version:
    description: 'Android version (android14)'
    required: true
  kernel_version:
    description: 'Kernel version (6.1)'
    required: true

runs:
 using: composite
 steps:
  - name: apply bbrv3 patch
    shell: bash
    run: |
     cd "$COMMON"
     curl -L -s "https://raw.githubusercontent.com/jimsterino98/kernel_patches_additional/refs/heads/main/bbr3/0001-Test-${{ inputs.android_version }}-${{ inputs.kernel_version }}-bbrv3.patch" | patch -p1 -F 3

     
  - name: add bbr configs to defconfig
    shell: bash
    run: |
     cat >> "$GKI_DEFCONFIG" << 'EOF'
     # enable bbr
     CONFIG_NET_SCH_FQ=y
     CONFIG_NET_SCH_FQ_CODEL=y
     CONFIG_TCP_CONG_ADVANCED=y
     CONFIG_TCP_CONG_BBR=y
     CONFIG_TCP_CONG_BBR3=y
     CONFIG_TCP_CONG_CUBIC=y
     CONFIG_DEFAULT_CUBIC=y
     # CONFIG_TCP_CONG_BIC is not set
     # CONFIG_TCP_CONG_WESTWOOD is not set
     # CONFIG_TCP_CONG_HTCP is not set
     EOF
